<!-- ============================================================
     PARTE 1 — Abrir automáticamente la sección correcta
     ============================================================
     Esto hace que los links del index.html como tramites.html#cert
     abran directamente esa categoría, en vez de mostrar siempre
     la pantalla de Inicio.

     INSTALACIÓN:
     1. Abre tramites.html en GitHub (ícono de lápiz).
     2. Busca con Ctrl+F: const CAPS=[
     3. Justo ANTES de esa línea, pega este bloque completo
        (desde <script> hasta el primer </script> de abajo).
     ============================================================ -->
<script>
(function(){
  var hash = window.location.hash.replace('#','');
  var validSections = ['cert','libretas','emb','escrito','personalidad','cedula','fotos','medicos','diag','caps','sing','ext','auth'];
  if(validSections.indexOf(hash) !== -1){
    window.addEventListener('DOMContentLoaded', function(){
      var navItem = null;
      var navs = document.querySelectorAll('.navs .nav');
      var ids = ['inicio','cert','libretas','emb','escrito','personalidad','cedula','fotos','medicos','diag','caps','sing','ext','auth'];
      var idx = ids.indexOf(hash);
      if(idx >= 0 && navs[idx]){ navItem = navs[idx]; }
      if(typeof show === 'function'){
        show(hash, navItem);
      }
    });
  }
})();
</script>
